info:
  name: Update Warehouse Order Status
  type: http
  seq: 2

http:
  method: PUT
  url: "{{warehouse_url}}/warehouse/orders/{{order_id}}/status?status=Processed"
  auth: inherit

runtime:
  variables:
    - name: warehouse_url
      value: http://localhost:8002

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
