info:
  name: Get Warehouse Orders
  type: http
  seq: 1

http:
  method: GET
  url: "{{warehouse_url}}/warehouse/orders"
  auth: inherit

runtime:
  variables:
    - name: warehouse_url
      value: http://localhost:8002

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
