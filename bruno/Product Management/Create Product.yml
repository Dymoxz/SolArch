info:
  name: Create Product
  type: http
  seq: 1

http:
  method: POST
  url: "{{pd_url}}/products"
  body:
    type: json
    data: |-
      {
        "name": "Appels",
        "price": 200,
        "inventory": 10,
        "supplier_id": "3fa85f64-5717-4562-b3fc-2c963f66afa6"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.body

        bru.setVar("productId", json.id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
