info:
  name: Create Payment
  type: http
  seq: 1

http:
  method: POST
  url: "{{pa_url}}/payments"
  body:
    type: json
    data: |-
      {
        "order_id": "3fa85f64-5717-4562-b3fc-2c963f66afa6",
        "customer_id": "11111111-1111-1111-1111-111111111111",
        "amount": 120,
        "method": "ForwardPay
        "
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.body

        bru.setVar("paymentId", json.id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
