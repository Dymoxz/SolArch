services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ball_rabbitmq
    ports:
      - "5672:5672" # De standaard AMQP poort voor je code
      - "15672:15672" # De RabbitMQ Management UI (Dashboard)
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: ball_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: order_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  order-api:
    build: ./order-management
    container_name: ball_order_api
    ports:
      - "8000:8000"
    environment:
      # Verwijzingen naar de andere containers binnen het Docker netwerk
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./order-management/app:/app # Hot-reloading: koppelt je lokale /app map aan de container
    restart: unless-stopped
  order-consumer:
    build: ./order-management
    container_name: ball_order_consumer
    # Overrides the default Dockerfile entrypoint/CMD to run the background worker loop
    command: python /app/consumer.py
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./order-management/app:/app # Also supports hot-reloading if you make updates to consumer.py!
    restart: unless-stopped

  warehouse-api:
    build: ./warehouse-management
    container_name: ball_warehouse_api
    ports:
      - "8001:8001"
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./warehouse-management/app:/app
    restart: unless-stopped

  warehouse-consumer:
    build: ./warehouse-management
    container_name: ball_warehouse_consumer
    command: python /app/consumer.py
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./warehouse-management/app:/app
    restart: unless-stopped

  shipping-api:
    build: ./shipping-management
    container_name: ball_shipping_api
    ports:
      - "8002:8002"
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./shipping-management/app:/app
    restart: unless-stopped

  shipping-consumer:
    build: ./shipping-management
    container_name: ball_shipping_consumer
    command: python /app/consumer.py
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./shipping-management/app:/app
    restart: unless-stopped

volumes:
  rabbitmq_data:
  postgres_data:

