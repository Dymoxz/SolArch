services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ball_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: ball_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: order_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  db-command:
    image: postgres:15-alpine
    container_name: ball_postgres_command
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: command_user
      POSTGRES_PASSWORD: command_password
      POSTGRES_DB: command_db
    volumes:
      - postgres_command_data:/var/lib/postgresql/data
    restart: unless-stopped

  db-query:
    image: postgres:15-alpine
    container_name: ball_postgres_query
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: query_user
      POSTGRES_PASSWORD: query_password
      POSTGRES_DB: query_db
    volumes:
      - postgres_query_data:/var/lib/postgresql/data
    restart: unless-stopped

  order-api:
    build: ./order-management
    container_name: ball_order_api
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_WRITE_URL=postgresql://command_user:command_password@db-command:5432/command_db
      - DATABASE_READ_URL=postgresql://query_user:query_password@db-query:5432/query_db
    depends_on:
      - rabbitmq
      - db-command
      - db-query
    volumes:
      - ./order-management/app:/app
    restart: unless-stopped

  order-consumer:
    build: ./order-management
    container_name: ball_order_consumer
    command: python /app/consumer.py
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_WRITE_URL=postgresql://command_user:command_password@db-command:5432/command_db
      - DATABASE_READ_URL=postgresql://query_user:query_password@db-query:5432/query_db
    depends_on:
      - rabbitmq
      - db-command
      - db-query
    volumes:
      - ./order-management/app:/app
    restart: unless-stopped

  product-api:
    build: ./product-management
    container_name: ball_product_api
    ports:
      - "8001:8000"
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./product-management/app:/app
    restart: unless-stopped

  product-consumer:
    build: ./product-management
    container_name: ball_product_consumer
    command: python /app/consumer.py
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./product-management/app:/app
    restart: unless-stopped

  customer-service:
    build: ./customer-service
    container_name: ball_customer_service
    command: node app/server.js
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./customer-service:/app
      - /app/node_modules
    restart: unless-stopped

  warehouse-api:
    build: ./warehouse-management
    container_name: ball_warehouse_api
    ports:
      - "8002:8001"
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_WRITE_URL=postgresql://command_user:command_password@db-command:5432/command_db
      - DATABASE_READ_URL=postgresql://query_user:query_password@db-query:5432/query_db
    depends_on:
      - rabbitmq
      - db-command
      - db-query
    volumes:
      - ./warehouse-management/app:/app
    restart: unless-stopped

  warehouse-consumer:
    build: ./warehouse-management
    container_name: ball_warehouse_consumer
    command: python /app/consumer.py
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_WRITE_URL=postgresql://command_user:command_password@db-command:5432/command_db
      - DATABASE_READ_URL=postgresql://query_user:query_password@db-query:5432/query_db
    depends_on:
      - rabbitmq
      - db-command
      - db-query
    volumes:
      - ./warehouse-management/app:/app
    restart: unless-stopped

  shipping-api:
    build: ./shipping-management
    container_name: ball_shipping_api
    ports:
      - "8003:8002"
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_WRITE_URL=postgresql://command_user:command_password@db-command:5432/command_db
      - DATABASE_READ_URL=postgresql://query_user:query_password@db-query:5432/query_db
    depends_on:
      - rabbitmq
      - db-command
      - db-query
    volumes:
      - ./shipping-management/app:/app
    restart: unless-stopped

  shipping-consumer:
    build: ./shipping-management
    container_name: ball_shipping_consumer
    command: python /app/consumer.py
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_WRITE_URL=postgresql://command_user:command_password@db-command:5432/command_db
      - DATABASE_READ_URL=postgresql://query_user:query_password@db-query:5432/query_db
    depends_on:
      - rabbitmq
      - db-command
      - db-query
    volumes:
      - ./shipping-management/app:/app
    restart: unless-stopped

  payment-api:
    build: ./payment-management
    container_name: ball_payment_api
    ports:
      - "8004:8000"
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./payment-management/app:/app
    restart: unless-stopped

  payment-consumer:
    build: ./payment-management
    container_name: ball_payment_consumer
    command: python /app/consumer.py
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
      - DATABASE_URL=postgresql://order_user:order_password@db:5432/order_management
    depends_on:
      - rabbitmq
      - db
    volumes:
      - ./payment-management/app:/app
    restart: unless-stopped

  excel-publisher:
    build: ./external-integration
    container_name: ball_excel_publisher
    environment:
      - RABBITMQ_URL=amqp://admin:admin_password@rabbitmq:5672/
    depends_on:
      - rabbitmq
    volumes:
      - ./external-integration/app:/app
    profiles:
      - tools

volumes:
  rabbitmq_data:
  postgres_data:
  postgres_command_data:
  postgres_query_data: